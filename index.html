<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbnow — Add your now to the world.</title>
  <meta name="description" content="Add your now to the world." />
  <meta name="theme-color" content="#070b14" />
  <meta property="og:title" content="Orbnow" />
  <meta property="og:description" content="Add your now to the world." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/orbnow-logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
  <div class="node node-a"></div>
  <div class="node node-b"></div>
  <div class="node node-c"></div>
  <div class="node node-d"></div>

  <main class="page-shell">
    <section class="hero-card">
      <div class="hero-topline">ORBNOW</div>

      <div class="logo-wrap">
        <div class="logo-glow"></div>
        <img class="logo" src="assets/orbnow-logo.jpg" alt="Orbnow logo" />
      </div>

      <div class="meta-panel" aria-label="Orbnow features">
        <div class="meta-line">・ Live 3D Globe</div>
        <div class="meta-line">・ Location-based</div>
        <div class="meta-line">・ 1-Hour Stories</div>
      </div>

      <h1 class="hero-title">Add your now<br>to the world.</h1>

      <p class="invite-copy">You’re invited to Orbnow.</p>

      <div class="cta-row">
        <a
          class="join-btn"
          href="https://apps.apple.com/jp/app/omma/id6761145772"
          target="_blank"
          rel="noopener noreferrer"
        >
          Join Orbnow
        </a>
      </div>
    </section>
  </main>
</body>
</html>
