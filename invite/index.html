<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Join me on Orbnow</title>
  <meta name="description" content="Add me on Orbnow and see my now on the globe." />
  <meta name="theme-color" content="#070b14" />

  <meta property="og:title" content="Join me on Orbnow" />
  <meta property="og:description" content="Add me on Orbnow and see my now on the globe." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://orbnow.app/assets/orbnow-logo.jpg" />
  <meta property="og:url" content="https://orbnow.app/invite/" />
  <meta property="og:site_name" content="Orbnow" />

  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
  <div class="node node-a"></div>
  <div class="node node-b"></div>
  <div class="node node-c"></div>
  <div class="node node-d"></div>

  <main class="page-shell">
    <section class="hero-card">
      <div class="hero-topline">ORBNOW</div>

      <div class="logo-wrap">
        <div class="logo-glow"></div>
        <img class="logo" src="/assets/orbnow-logo.jpg" alt="Orbnow logo" />
      </div>

      <div class="meta-panel" aria-label="Orbnow features">
        <div class="meta-line"><span class="meta-icon">🌏</span><span>Live 3D Globe</span></div>
        <div class="meta-line"><span class="meta-icon">📍</span><span>Location-based</span></div>
        <div class="meta-line"><span class="meta-icon">📷</span><span>1-Hour Stories</span></div>
      </div>

      <h1 class="hero-title">Add your now<br>to the world.</h1>

      <p class="invite-copy">You’re invited to Orbnow.</p>

      <div class="cta-row">
        <a
          class="join-btn"
          href="#"
          id="openOrbnowBtn"
        >
          Open Orbnow
        </a>
      </div>
    </section>
  </main>

  <script>
  const appStoreUrl = "https://apps.apple.com/us/app/orbnow/id6761145772";
  const openBtn = document.getElementById("openOrbnowBtn");

  function inviteCodeFromPath() {
    const params = new URLSearchParams(window.location.search);
    const queryCode = params.get("code");

    if (queryCode) {
      return queryCode;
    }

    const parts = window.location.pathname.split("/").filter(Boolean);

    if (parts.length >= 2 && parts[0] === "invite") {
      return parts[1];
    }

    return null;
  }

  if (openBtn) {
    openBtn.addEventListener("click", function (event) {
      event.preventDefault();

      const code = inviteCodeFromPath();

      if (!code) {
        window.location.href = appStoreUrl;
        return;
      }

      const appUrl = "orbnow://invite/" + encodeURIComponent(code);

      let didLeavePage = false;

      const markLeftPage = function () {
        didLeavePage = true;
      };

      window.addEventListener("pagehide", markLeftPage, { once: true });
      window.addEventListener("blur", markLeftPage, { once: true });

      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          didLeavePage = true;
        }
      }, { once: true });

      window.location.href = appUrl;

      setTimeout(function () {
        if (!didLeavePage && !document.hidden) {
          window.location.href = appStoreUrl;
        }
      }, 3000);
    });
  }
</script>
</body>
</html>
